services:
  app:
    build: .
    container_name: Exam_jobs_app
    restart: always
    volumes:
      - .:/var/www
    depends_on:
      - mysql
    environment:
      APP_ENV: production

  nginx:
    image: nginx:alpine
    container_name: Exam_jobs_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: Exam_jobs_mysql
    restart: always
    environment:
      MYSQL_DATABASE: exam_jobs
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: